basePath: /open2api/v1
definitions:
  github_com_engigu_baihu-panel_internal_utils.Response:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
  utils.PaginationData:
    properties:
      data: {}
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  vo.EnvVO:
    properties:
      created_at:
        type: string
      hidden:
        type: boolean
      id:
        type: string
      name:
        type: string
      remark:
        type: string
      updated_at:
        type: string
      value:
        type: string
    type: object
  vo.ExecutionResultVO:
    properties:
      duration:
        type: integer
      end_time:
        type: string
      error:
        type: string
      exit_code:
        type: integer
      log_id:
        type: string
      output:
        type: string
      start_time:
        type: string
      status:
        type: string
      success:
        type: boolean
      task_id:
        type: string
    type: object
  vo.TaskLogVO:
    properties:
      agent_id:
        type: string
      command:
        type: string
      created_at:
        type: string
      duration:
        type: integer
      end_time:
        type: string
      error:
        type: string
      exit_code:
        type: integer
      id:
        type: string
      output:
        type: string
      start_time:
        type: string
      status:
        type: string
      task_id:
        type: string
      task_name:
        type: string
      task_type:
        type: string
    type: object
  vo.TaskVO:
    properties:
      agent_id:
        type: string
      clean_config:
        type: string
      command:
        type: string
      config:
        type: string
      created_at:
        type: string
      enabled:
        type: boolean
      envs:
        type: string
      id:
        type: string
      languages:
        items:
          additionalProperties:
            type: string
          type: object
        type: array
      last_run:
        type: string
      name:
        type: string
      next_run:
        type: string
      random_range:
        type: integer
      retry_count:
        type: integer
      retry_interval:
        type: integer
      schedule:
        type: string
      tags:
        type: string
      timeout:
